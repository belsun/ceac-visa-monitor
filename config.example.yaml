# CEAC Visa Status Monitor - Configuration
# Copy this file to config.yaml and fill in your details.

# Your CEAC case information (required)
case:
  app_id: "AA000000000"        # Application ID / Case Number (e.g., AA0020AKAX)
  passport: "E12345678"        # Passport number
  surname: "ZHANG"             # First 5 letters of surname
  location: "HNK"              # Embassy/Consulate location code
                                # Common codes:
                                #   HNK = Hong Kong
                                #   CHI = Beijing
                                #   CGS = Guangzhou
                                #   SHA = Shanghai
                                #   CGO = Chengdu
                                #   SYA = Shenyang
                                #   WUH = Wuhan
                                #   LON = London
                                #   NYC = New York (US consulate)
  visa_type: "NIV"             # NIV = Nonimmigrant, IV = Immigrant

# CAPTCHA solving method
settings:
  captcha_method: "2captcha"   # ocr | manual | tesseract | 2captcha | audio
  captcha_api_key: ""          # 2captcha API key (required if method=2captcha)
                                # Get one at https://2captcha.com ($2.99 for 1000 CAPTCHAs)
  check_interval_minutes: 60   # Default interval when using --loop

# Notification channels (at least one recommended)
notification:
  # Telegram Bot notifications
  telegram:
    bot_token: ""              # Your Telegram bot token (from @BotFather)
    chat_id: ""                # Your Telegram chat ID (get from @userinfobot)

  # WeChat notifications (iLink Bot API)
  weixin:
    token: ""                  # WeChat bot token (from Hermes iLink QR login)
    base_url: "https://ilinkai.weixin.qq.com"  # iLink API base URL
    to_user: ""                # Your WeChat user ID (e.g. o9xxx@im.wechat)

  # Generic webhook (POST JSON with {"text": "..."})
  webhook: ""
